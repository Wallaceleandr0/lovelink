<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LoveLink</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#050505,#18001f,#32003d);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 25px;
    padding: 30px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(255,0,255,0.1);
    width: 100%;
    overflow: hidden;
}

.title{
    text-align:center;
    font-size:2.7rem;
    margin-bottom:10px;
    color:#ff8cf8;
}

.subtitle{
    text-align:center;
    color:#dcbfff;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

@media(max-width:700px){
    .grid{
        grid-template-columns:1fr;
    }
}

input,
textarea{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.07);
    color:white;
    border:1px solid rgba(255,255,255,0.06);
}

input::placeholder,
textarea::placeholder{
    color:#ccc;
}

textarea{
    resize:none;
    height:120px;
    margin-top:15px;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:1rem;
    font-weight:bold;
    color:white;
    background:linear-gradient(90deg,#ff00cc,#7b2cff);
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

.preview{
    text-align:center;
}

.preview img {
    width: 240px;
    height: 240px;

    object-fit: cover;
    object-position: center;

    border-radius: 25px;
    border: 4px solid #ff6cff;

    margin-bottom: 20px;

    box-shadow: 0 0 25px rgba(255, 108, 255, 0.35);

    image-rendering: auto;

    transform: translateZ(0);

    filter: contrast(1.02) saturate(1.03);
}

.love-title{
    font-size:2rem;
    margin-bottom:10px;
    color:#ffb0ff;
}

.counter{
    margin-top:10px;
    color:#ffd8ff;
    font-size:1.1rem;
}

.frase{
    margin-top:20px;
    font-style:italic;
    color:#eee;
    line-height:1.7;
}

audio{
    width:100%;
    margin-top:25px;
}

.route{
    margin-top:20px;
    color:#ff8cf8;
    font-weight:bold;
    word-break:break-all;
}

.json-box{
    margin-top:25px;
}

.json-box textarea{
    height:220px;
}

.not-found{
    text-align:center;
    font-size:1.4rem;
    color:#ffb6ff;
}

</style>
</head>
<body>

<div class="container" id="app"></div>

<script>

function calcularTempo(dataInicio){

    const inicio = new Date(dataInicio);
    const hoje = new Date();

    const diferenca = hoje - inicio;

    const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));

    const anos = Math.floor(dias / 365);
    const meses = Math.floor((dias % 365) / 30);
    const diasRestantes = dias % 30;

    return `${anos} ano(s), ${meses} mês(es) e ${diasRestantes} dia(s)`;
}

function mostrarCadastro(){

    document.getElementById('app').innerHTML = `
    
    <div class="card">

        <h1 class="title">LoveLink</h1>

        <p class="subtitle">
            Crie páginas românticas para casais ❤️
        </p>

        <div class="grid">

            <input type="text" id="nome1" placeholder="Nome da pessoa 1">

            <input type="text" id="nome2" placeholder="Nome da pessoa 2">

            <input type="text" id="slug" placeholder="Slug personalizado">

            <input type="date" id="data">

        </div>

        <textarea id="frase" placeholder="Digite uma frase especial"></textarea>

        <button onclick="gerarJSON()">
            Gerar Cadastro
        </button>

        <div class="json-box">

            <textarea id="jsonOutput" readonly></textarea>

        </div>

    </div>
    
    `;
}

function gerarJSON(){

    const nome1 = document.getElementById('nome1').value.trim();
    const nome2 = document.getElementById('nome2').value.trim();
    const slug = document.getElementById('slug').value.trim();
    const data = document.getElementById('data').value;
    const frase = document.getElementById('frase').value.trim();

    if(!nome1 || !nome2 || !slug || !data || !frase){

        alert('Preencha todos os campos.');
        return;
    }

    const dados = {
        slug,
        nome1,
        nome2,
        frase,
        data
    };

    document.getElementById('jsonOutput').value =
        JSON.stringify(dados, null, 2);
}

async function carregarCasal(){

    const params = new URLSearchParams(window.location.search);

    const slug = params.get('slug');

    const urlFinal = `${window.location.origin}/lovelink/?slug=${slug}`;

    if(!slug){

        mostrarCadastro();
        return;
    }

    try{

        const response = await fetch('casais.json');

        const casais = await response.json();

        const casal = casais.find(c => c.slug === slug);

        if(!casal){

            document.getElementById('app').innerHTML = `
                <div class="card">
                    <div class="not-found">
                        Casal não encontrado 💔
                    </div>
                </div>
            `;

            return;
        }

        let fotoPath = `fotos/foto-${slug}.png`;

        const testarImagem = new Image();

        testarImagem.onerror = function(){
            testarImagem.src = `fotos/foto-${slug}.jpg`;
        };

        testarImagem.src = fotoPath;

        const musicaPath = `musicas/musica-${slug}.mp3`;

        document.getElementById('app').innerHTML = `
        
        <div class="card">

            <div class="preview">

                <img
                    id="fotoCasal"
                    src="${fotoPath}"
                    alt="Foto do casal"
                >

                <div class="love-title">
                    ${casal.nome1} ❤️ ${casal.nome2}
                </div>

                <div class="counter" id="contador"></div>

                <div class="frase">
                    “${casal.frase}”
                </div>

                <audio controls autoplay loop>
                    <source src="${musicaPath}" type="audio/mpeg">
                </audio>

                <div class="route">
                    ${urlFinal}
                </div>

            </div>

        </div>
        
        `;

        document.getElementById('fotoCasal').onerror = function(){
            this.src = `fotos/foto-${slug}.jpg`;
        };

        function atualizarContador(){

            document.getElementById('contador').innerHTML =
                `Juntos há ${calcularTempo(casal.data)}`;
        }

        atualizarContador();

        setInterval(atualizarContador,1000);

    }catch(error){

        console.error(error);

        document.getElementById('app').innerHTML = `
            <div class="card">
                <div class="not-found">
                    Erro ao carregar o sistema.
                </div>
            </div>
        `;
    }
}

carregarCasal();

</script>

</body>
</html>
